apiVersion: apps/v1
kind: Deployment
metadata:
  name: civitas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: civitas
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: civitas
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: civitas
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: civitas
          image: ghcr.io/kbcadal/civitas:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: civitas-config
          volumeMounts:
            - name: fakedb
              mountPath: /app/server/fake-db
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: fakedb
          persistentVolumeClaim:
            claimName: civitas-fakedb
